# Site settings
title: Ice Blog
SEOTitle: "冰冰洁的博客 | Ice Blog"
author: "韩冰洁"
email: icejie_pingan@qq.com
description: "把日常观察、学习笔记和小小灵感认真收好。"
keyword: "韩冰洁, Ice Blog, 个人博客, Jekyll"
lang: zh-CN
url: "https://bingjie-han.github.io"
baseurl: ""
github_repo: "https://github.com/bingjie-han/bingjie-han.github.io"

# Profile
avatar: /img/1.jpg
sidebar: true
sidebar-about-description: "慢慢写，认真生活。"

# Navigation
nav:
  - title: Home
    url: /
  - title: About
    url: /about/
  - title: Tags
    url: /tags/

# Social links
github_username: bingjie-han
zhihu_username: ""
RSS: true

# Build settings
permalink: /:year/:month/:day/:title/
paginate: 6
paginate_path: "/page:num/"
markdown: kramdown
highlighter: rouge
plugins:
  - jekyll-paginate
kramdown:
  input: GFM
  hard_wrap: false

# Comments are disabled until the correct provider credentials are configured.
comments:
  enable: false

gitalk:
  enable: false
  clientID: ""
  clientSecret: ""
  repo: "bingjie-han.github.io"
  owner: "bingjie-han"
  admin: "bingjie-han"
  distractionFreeMode: true

disqus_username: ""

# Featured Tags
featured-tags: true
featured-condition-size: 0

# Progressive Web App
chrome-tab-theme-color: "#103b46"
service-worker: true

# Friends
friends:
  - title: GitHub
    href: "https://github.com/bingjie-han"
  - title: Apple Developer
    href: "https://developer.apple.com/"

exclude:
  - node_modules
  - vendor
  - Gemfile
  - Gemfile.lock
  - package.json
  - Gruntfile.js
  - README.md
