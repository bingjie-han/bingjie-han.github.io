---
layout: default
---

<section class="page-hero">
    <p class="eyebrow">{{ page.eyebrow | default: 'Ice Blog' }}</p>
    <h1>{{ page.title | default: site.title }}</h1>
    {% if page.description %}<p class="hero-description">{{ page.description }}</p>{% endif %}
</section>

<section class="content-shell">
    <article class="prose page-prose">
        {{ content }}
    </article>
</section>
