---
layout: default
---

<section class="post-hero keynote-hero">
    <p class="eyebrow">Keynote</p>
    <h1>{{ page.title }}</h1>
    {% if page.subtitle %}<p class="hero-description">{{ page.subtitle }}</p>{% endif %}
</section>

<section class="keynote-frame">
    <iframe src="{{ page.iframe }}" title="{{ page.title }}" loading="lazy"></iframe>
</section>

<section class="content-shell">
    <article class="prose page-prose">
        {{ content }}
    </article>
</section>
