<nav class="site-nav" aria-label="Primary navigation">
    <a class="brand" href="{{ '/' | relative_url }}" aria-label="{{ site.title }} home">
        <img class="brand-icon" src="{{ '/img/2.png' | relative_url }}" alt="" aria-hidden="true">
        <span class="brand-text">{{ site.title }}</span>
    </a>
    <button class="nav-toggle" type="button" aria-label="Toggle navigation" aria-expanded="false" aria-controls="site-menu">
        <span></span>
        <span></span>
    </button>
    <div class="nav-links" id="site-menu">
        {% for item in site.nav %}
        <a href="{{ item.url | relative_url }}">{{ item.title }}</a>
        {% endfor %}
    </div>
</nav>
<script>
(function () {
    var toggle = document.querySelector('.nav-toggle');
    var links = document.querySelector('.nav-links');
    if (!toggle || !links) return;
    toggle.addEventListener('click', function () {
        var opened = links.classList.toggle('is-open');
        toggle.classList.toggle('is-open', opened);
        toggle.setAttribute('aria-expanded', opened ? 'true' : 'false');
    });
})();
</script>
